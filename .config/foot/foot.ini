[main]

font=JetBrainsMono Nerd Font:weight=Bold:size=12
font-bold=JetBrainsMono Nerd Font:weight=Bold:size=12
font-italic=JetBrainsMono Nerd Font:slant=Italic:size=12
font-bold-italic=JetBrainsMono Nerd Font:weight=Bold:slant=Italic:size=12
dpi-aware=yes
term=xterm-256color
pad=8x8
initial-window-size-pixels=1000x700

[scrollback]
lines=5000

[colors]

alpha=1.0

[mouse]

hide-when-typing=yes

[scrollback]

indicator-position=none

[url]

launch=xdg-open ${url}

[cursor]

style=block
blink=no

[colors]

foreground=d6deeb
background=011627

regular0=011627
regular1=ef5350
regular2=22da6e
regular3=addb67
regular4=82aaff
regular5=c792ea
regular6=21c7a8
regular7=d6deeb

bright0=575656
bright1=ef5350
bright2=22da6e
bright3=ffeb95
bright4=82aaff
bright5=c792ea
bright6=7fdbca
bright7=ffffff